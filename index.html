<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          
          try {
            // Try defining on window directly first
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e1) {
            // If window is non-configurable, define on Window.prototype
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Could not define custom fetch getter/setter:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

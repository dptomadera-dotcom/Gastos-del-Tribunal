<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gastos del Tribunal - Cuaderno Digital</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gastos Tribunal" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="shortcut icon" href="/icon-192.png" />
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          
          try {
            // Try defining on window directly first
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e1) {
            // If window is non-configurable, define on Window.prototype
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Could not define custom fetch getter/setter:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
